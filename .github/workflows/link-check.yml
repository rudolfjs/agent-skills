name: Link Check

on:
  pull_request:
    paths:
      - skills/**/*.md

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --version
          installOnly: true

      - name: Check skill links
        run: bash skills/lychee/scripts/check-links.sh 'skills/**/*.md'
