name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Install changie
        uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Batch and merge changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Commit changelog updates
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changes/ CHANGELOG.md
          git commit -m "chore: update changelog for ${TAG}"
          git push origin HEAD:main

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
