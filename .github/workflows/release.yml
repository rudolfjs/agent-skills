name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'nq-rdl-release-bot[bot]'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          repositories: agent-skills,agent-extensions

      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Check for unreleased changes
        run: |
          if [ -z "$(ls .changes/unreleased/ 2>/dev/null | grep -v .gitkeep)" ]; then
            echo "::error::No unreleased changelog entries found. Nothing to release."
            exit 1
          fi

      - name: Install changie
        uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Batch and merge changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Commit changelog updates
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changes/ CHANGELOG.md
          git commit -m "chore: update changelog for ${TAG}"
          git push origin HEAD:main

      - name: Move tag to include changelog commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false

      - name: Trigger agent-extensions sync
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/nq-rdl/agent-extensions/dispatches \
            --method POST \
            --field event_type=agent-skills-release \
            --field 'client_payload[tag]='"$TAG"
